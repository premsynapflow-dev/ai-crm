# Railway / Nixpacks build configuration
# Ensures both Python and Node.js are available so the
# Next.js frontend can be built alongside the FastAPI backend.

[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm ci --prefer-offline 2>/dev/null || npm install && npm run build && cd .."
]

[start]
cmd = "bash start.sh"
