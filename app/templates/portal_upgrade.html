<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynapFlow - Upgrade</title>
</head>
<body>
    <h1>SynapFlow</h1>
    <p class="tagline">AI-Powered Complaint Intelligence</p>
    <p><a href="/portal">Back to Dashboard</a></p>
    <form method="post" action="/portal/upgrade">
        <label for="plan_id">Choose Plan</label>
        <select id="plan_id" name="plan_id">
            {% for plan_id, plan in plans.items() %}
            <option value="{{ plan_id }}" {% if client and client.plan_id == plan_id %}selected{% endif %}>
                {{ plan.name }} - {{ plan.monthly_tickets }} tickets
            </option>
            {% endfor %}
        </select>
        <button type="submit">Update Plan</button>
    </form>

    <footer style="text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid #e5e7eb; background-color: #f9fafb;">
        <p style="color: #6b7280; font-size: 14px; margin: 0;">
            © 2026 <strong style="color: #111827;">SynapTec Pvt. Ltd.</strong> All rights reserved.
        </p>
    </footer>
</body>
</html>
