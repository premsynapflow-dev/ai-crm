services:
  - type: web
    name: ai-complaint-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm ci && npm run build && cd ..
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
